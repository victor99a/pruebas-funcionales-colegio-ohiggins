[pytest]
testpaths = specs
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    seguridad: Acceso denegado, RBAC, tokens invalidos, sin autenticacion
    funcionalidad: Flujos completos por rol (login, sidebar, acciones)
    public: Rutas publicas sin token
    admin_only: Solo rol ADMIN
    admin_docente: Roles ADMIN y DOCENTE
    boletin: Endpoint boletin con self-check
    asistencia: Endpoints de asistencia
    comunicaciones: Endpoints de comunicaciones
    edge_cases: Casos borde de tokens
